# PhilHealth BST (Benefit Settlement Token) Driver
# Insurance claim settlement workflow with reference number uniqueness enforcement

driver:
  id: "philhealth-bst"
  version: "1.0.0"
  title: "PhilHealth Benefit Settlement Token"
  description: "Settlement driver for PhilHealth insurance claims with unique reference validation"
  domain: "insurance"
  issuer_type: "voucher"

# -----------------------------------------------------------------------------
# Payload Schema - Claim reference and device tracking
# -----------------------------------------------------------------------------
payload:
  schema:
    id: "philhealth-bst.v1"
    format: "json_schema"
    inline:
      type: "object"
      required: ["reference"]
      properties:
        reference:
          type: "string"
          description: "PhilHealth claim reference number (case-insensitive unique)"
          pattern: "^[A-Za-z0-9-]+$"
          minLength: 3
          maxLength: 50
        device:
          type: "string"
          description: "Device UUID that issued the voucher"
          format: "uuid"
  storage:
    mode: "versioned"
    patch_strategy: "merge"
  constraints:
    unique_fields:
      - field: "reference"
        scope: "global"
        case_sensitive: false
        message: "Claim reference {value} has already been issued"

# -----------------------------------------------------------------------------
# Documents Registry - Standard redemption documents
# -----------------------------------------------------------------------------
documents:
  registry:
    - type: "SELFIE"
      title: "Selfie Photo"
      allowed_mimes: ["image/jpeg", "image/png"]
      max_size_mb: 5
      multiple: false
    - type: "SIGNATURE"
      title: "Digital Signature"
      allowed_mimes: ["image/png"]
      max_size_mb: 2
      multiple: false
    - type: "MAP_SNAPSHOT"
      title: "Location Map"
      allowed_mimes: ["image/png", "image/jpeg"]
      max_size_mb: 5
      multiple: false

# -----------------------------------------------------------------------------
# Checklist Template - Required items for settlement
# -----------------------------------------------------------------------------
checklist:
  template:
    - key: "claim_reference"
      label: "Claim reference provided"
      kind: "payload_field"
      payload_pointer: "/reference"
      required: true
      review: "none"
    - key: "redeemer_info"
      label: "Redeemer information"
      kind: "payload_field"
      payload_pointer: "/redeemer"
      required: true
      review: "none"

# -----------------------------------------------------------------------------
# Signals - None (auto-settle on redemption)
# -----------------------------------------------------------------------------
signals:
  definitions: []

# -----------------------------------------------------------------------------
# Gates - Auto-settle when claim reference exists
# -----------------------------------------------------------------------------
gates:
  definitions:
    - key: "has_reference"
      rule: "payload.reference != null"
    - key: "settleable"
      rule: "payload.reference != null"

# -----------------------------------------------------------------------------
# Audit - Full tracking
# -----------------------------------------------------------------------------
audit:
  enabled: true
  capture:
    - "payload_patch"
    - "attachment_upload"
    - "attachment_review"
    - "gate_change"

# -----------------------------------------------------------------------------
# Manifest - Disabled for simple workflows
# -----------------------------------------------------------------------------
manifest:
  enabled: false

# -----------------------------------------------------------------------------
# Form Flow Mapping - Redemption data to envelope
# -----------------------------------------------------------------------------
form_flow_mapping:
  payload:
    redeemer:
      mobile: "wallet_info.mobile"
      name: "bio_fields.full_name | bio_fields.name"
    wallet:
      bank_code: "wallet_info.bank_code"
      account_number: "wallet_info.account_number"
      settlement_rail: "wallet_info.settlement_rail"
    location:
      latitude: "location_capture.latitude:float"
      longitude: "location_capture.longitude:float"
      formatted_address: "location_capture.formatted_address"
  attachments:
    SELFIE:
      source: "selfie_capture.selfie"
      filename: "selfie.jpg"
      mime: "image/jpeg"
    SIGNATURE:
      source: "signature_capture.signature"
      filename: "signature.png"
      mime: "image/png"
