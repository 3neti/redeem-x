# PhilHealth BST Kiosk Configuration
# This file defines the complete kiosk setup for PhilHealth BST vouchers
# Usage: /pwa/portal?skin=philhealth-bst

# Kiosk Identity
title: PhilHealth BST
subtitle: Benefit Settlement Token
card_description: null  # Falls back to "<type_label> Voucher" if null
voucher_type: settlement  # Type: settlement|redeemable|payable

# Voucher Configuration
config:
  campaign: philhealth-bst
  driver: philhealth-bst@1.0.0  # Uses PhilHealth BST driver with unique reference validation
  amount: 0  # Hidden - no deposit required
  target_amount: null  # User enters reimbursement amount

# Input Fields
fields:
  # Required on redemption
  inputs:
    - mobile
    - name
  # Collected at issuance (settlement payload)
  # Supports both string (backward compatible) and object formats
  payload:
    - reference  # Manual text entry
    - name: device  # Auto-injected device UUID
      type: auto_device_id
      editable: false  # User cannot modify

# Callbacks
callbacks:
  feedback: null  # No webhook

# UI Labels & Text
# Note: Any label can be overridden via URL query parameter
# Placeholders are auto-generated: "<label>" → "Enter <label>"
ui:
  # Branding
  logo: null  # Path to logo image
  theme_color: "#0066cc"  # Primary color
  
  # Voucher Type Label
  type_label: BST  # Override default "Settlement" label
  
  # Input Field Labels
  amount_label: Deposit Amount
  amount_placeholder: null  # Auto-generated: "Enter deposit amount"
  amount_keypad_title: null  # Auto-generated: same as amount_label
  target_label: Case Amount 
  target_placeholder: "tap to enter amount"# Auto-generated: "Enter reimbursement amount"
  target_keypad_title: null  # Auto-generated: same as target_label
  
  # Buttons
  button_text: Issue BST
  print_button: Print Receipt
  new_button: Issue Another BST
  retry_button: Try Again
  
  # Success State
  success_title: BST Issued!
  success_message: Scan QR code to authenticate
  
  # Error State
  error_title: Issuance Failed
  error_message: null  # Dynamic from API error
